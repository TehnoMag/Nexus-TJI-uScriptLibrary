CONST
	uSL_VERSION 2.0
END

RULE	event Mod.uScriptLibrary
	:action
		
		//Register Top level object
		U.uSL := getMachine("Mod/uScriptLibrary"):changeState(MOD, 0);
		
		Return(1);
		
	:end
END

MACHINE "Mod/uScriptLibrary"

	STATE MOD
	
		RULE	event In
			:action
			
				//Allocate modules pull
				Modules := getFreeSel();
					DIM(Modules, 256);
					
				//Call Configuration for standalone mode
				uCall(Mod.uScriptLibrary.Config, 0);
			
			:end
		END
	
	END

END

